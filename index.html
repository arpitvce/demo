<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CineAI - Smart AI-Powered Movie Recommendation System. Get personalized movie recommendations based on your mood, preferences, and viewing history.">
    <meta name="keywords" content="movies, recommendations, AI, personalized, streaming, watchlist">
    <meta name="author" content="CineAI">
    <title>CineAI — Smart Movie Recommendations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/styles/index.css">
    <link rel="stylesheet" href="src/styles/animations.css">
    <link rel="stylesheet" href="src/styles/navbar.css">
    <link rel="stylesheet" href="src/styles/hero.css">
    <link rel="stylesheet" href="src/styles/movieCard.css">
    <link rel="stylesheet" href="src/styles/movieRow.css">
    <link rel="stylesheet" href="src/styles/searchBar.css">
    <link rel="stylesheet" href="src/styles/filters.css">
    <link rel="stylesheet" href="src/styles/chatbot.css">
    <link rel="stylesheet" href="src/styles/mood.css">
    <link rel="stylesheet" href="src/styles/home.css">
    <link rel="stylesheet" href="src/styles/movieDetail.css">
    <link rel="stylesheet" href="src/styles/profile.css">
    <link rel="stylesheet" href="src/styles/discover.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
</head>
<body>
    <!-- Navigation Bar -->
    <nav id="navbar" class="navbar">
        <div class="navbar-inner">
            <a href="#/" class="navbar-logo" id="nav-logo">
                <span class="logo-icon">🎬</span>
                <span class="logo-text">Cine<span class="logo-accent">AI</span></span>
            </a>
            <div class="navbar-links" id="nav-links">
                <a href="#/" class="nav-link active" data-page="home">Home</a>
                <a href="#/discover" class="nav-link" data-page="discover">Discover</a>
                <a href="#/profile" class="nav-link" data-page="profile">My Profile</a>
            </div>
            <div class="navbar-actions">
                <div class="search-container" id="search-container">
                    <button class="search-toggle" id="search-toggle" aria-label="Toggle search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    </button>
                    <div class="search-expanded" id="search-expanded">
                        <input type="text" class="search-input" id="search-input" placeholder="Search movies, genres, actors..." autocomplete="off">
                        <div class="search-dropdown" id="search-dropdown"></div>
                    </div>
                </div>
                <a href="#/profile" class="nav-avatar" id="nav-avatar" aria-label="User profile">
                    <div class="avatar-circle">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                </a>
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-overlay" id="mobile-menu-overlay">
        <div class="mobile-menu-content">
            <a href="#/" class="mobile-nav-link" data-page="home">🏠 Home</a>
            <a href="#/discover" class="mobile-nav-link" data-page="discover">🔍 Discover</a>
            <a href="#/profile" class="mobile-nav-link" data-page="profile">👤 My Profile</a>
        </div>
    </div>

    <!-- Main Content -->
    <main id="app-content" class="app-content"></main>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- AI Chatbot -->
    <div id="chatbot-widget" class="chatbot-widget">
        <button class="chatbot-toggle" id="chatbot-toggle" aria-label="Open AI assistant">
            <span class="chatbot-icon">🤖</span>
            <span class="chatbot-pulse"></span>
        </button>
        <div class="chatbot-panel" id="chatbot-panel">
            <div class="chatbot-header">
                <div class="chatbot-header-info">
                    <span class="chatbot-avatar">🤖</span>
                    <div>
                        <h3>CineAI Assistant</h3>
                        <span class="chatbot-status">Online</span>
                    </div>
                </div>
                <button class="chatbot-close" id="chatbot-close" aria-label="Close chat">✕</button>
            </div>
            <div class="chatbot-messages" id="chatbot-messages">
                <div class="chat-message bot">
                    <span class="chat-avatar">🤖</span>
                    <div class="chat-bubble">Hey! I'm your CineAI assistant. Ask me for movie recommendations! Try: "What should I watch tonight?" or "Suggest a thriller"</div>
                </div>
            </div>
            <div class="chatbot-quick-actions" id="chatbot-quick-actions">
                <button class="quick-action" data-prompt="What should I watch tonight?">🎬 What to watch?</button>
                <button class="quick-action" data-prompt="Suggest a comedy movie">😂 Comedy</button>
                <button class="quick-action" data-prompt="Best thriller movies">😱 Thriller</button>
                <button class="quick-action" data-prompt="Recommend something based on my watchlist">📋 From watchlist</button>
            </div>
            <div class="chatbot-input-area">
                <input type="text" class="chatbot-input" id="chatbot-input" placeholder="Ask me anything about movies...">
                <button class="chatbot-send" id="chatbot-send" aria-label="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4 20-7z"/><path d="m22 2-11 11"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <p class="loader-text">Loading CineAI...</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="src/api/mockData.js"></script>
    <script src="src/api/tmdb.js"></script>
    <script src="src/store/userStore.js"></script>
    <script src="src/engine/recommendations.js"></script>
    <script src="src/engine/mood.js"></script>
    <script src="src/engine/search.js"></script>
    <script src="src/components/toast.js"></script>
    <script src="src/components/movieCard.js"></script>
    <script src="src/components/movieRow.js"></script>
    <script src="src/components/heroCarousel.js"></script>
    <script src="src/components/moodSelector.js"></script>
    <script src="src/components/chatbot.js"></script>
    <script src="src/components/navbar.js"></script>
    <script src="src/components/filterPanel.js"></script>
    <script src="src/pages/home.js"></script>
    <script src="src/pages/movieDetail.js"></script>
    <script src="src/pages/profile.js"></script>
    <script src="src/pages/discover.js"></script>
    <script src="src/pages/searchPage.js"></script>
    <script src="src/router.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
